<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>__SITE_TITLE__ Status</title>
  <link rel="stylesheet" href="/web/css/common.css?v=__CACHE_BUST__">
  <link rel="stylesheet" href="/web/css/status.css?v=__CACHE_BUST__">
</head>
<body data-server-ident="__SERVER_IDENT__">
  <body data-server-ident="__SERVER_IDENT__">
  <div id="leaderboardOverlay" class="loadoutOverlay">
    <div class="loadoutPopup" style="min-width:340px; max-width:520px;">
      <h3>🏆 Top 10 — Avg Kills Per Round</h3>
      <div id="leaderboardContent" class="small">Loading…</div>
      <button class="loadoutClose" id="leaderboardClose">Close</button>
    </div>
  </div>
  <div class="wrap">
  <div class="wrap">
    <div class="top">
      <div>
        <h1>__SITE_HEADING__ Status</h1>
        <div class="nav">__NAV__</div>
      </div>
      <div class="pill">Target: <b>__DEFAULT_TARGET__</b> • Auto-refresh: 5s</div>
    </div>

    <div class="grid">
      <div class="card server">
        <h2>Server</h2>
        <div class="rows" id="serverRows"></div>
        <div class="statusbar">
          <div class="dot" id="dot"></div>
          <div class="small" id="lastUpdate">Waiting…</div>
          <button id="refreshBtn">Refresh now</button>
        </div>
      </div>

      <div class="card players">
        <h2>Players</h2>
        <div id="playersWrap"></div>
      </div>

      <div class="card lastRounds">
        <h2>Last 5 Rounds</h2>
        <div id="lastRoundsWrap" class="small">Loading…</div>
      </div>

      <div class="card maplist">
        <h2>Maplist</h2>
        <div class="rows" id="mapRows"></div>
      </div>

      <div hidden class="card raw">
        <h2>Raw KV</h2>
        <details>
          <summary>Show / hide raw KV JSON</summary>
          <pre class="mono" id="rawKv">{}</pre>
        </details>
      </div>
    </div>
  </div>

  __FOOTER__

  <script src="/web/js/common.js?v=__CACHE_BUST__"></script>
  <script src="/web/js/status.js?v=__CACHE_BUST__"></script>
</body>
</html>
